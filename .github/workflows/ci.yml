name: API Test CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  api-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        environment: [staging, production]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
    
    - name: Validate test files
      run: |
        python main.py validate tests/*.txt
        python main.py validate tests/*.yml
    
    - name: Run API Tests
      env:
        API_TEST_BASE_URL: ${{ secrets.API_BASE_URL }}
        API_TEST_API_KEY: ${{ secrets.API_KEY }}
      run: |
        python main.py run \
          --environment ${{ matrix.environment }} \
          --parallel \
          --fail-fast \
          --output reports/${{ matrix.environment }}
    
    - name: Upload test reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: api-test-reports-${{ matrix.environment }}
        path: reports/${{ matrix.environment }}/
        retention-days: 30
    
    - name: Publish HTML Report
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main' && matrix.environment == 'staging'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports/staging
        destination_dir: test-reports
    
    - name: Send Slack Notification
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#api-tests'
        text: |
          API Tests Failed for ${{ matrix.environment }}
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  security-scan:
    runs-on: ubuntu-latest
    needs: api-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run security scan
      run: |
        pip install safety bandit
        safety check -r requirements.txt
        bandit -r src/ -f json -o bandit-report.json
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-scan-report
        path: bandit-report.json

  performance-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[performance-test]')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install locust
    
    - name: Run Performance Tests
      env:
        API_TEST_BASE_URL: ${{ secrets.API_BASE_URL }}
      run: |
        # Run performance tests if available
        if [ -f "tests/performance_test.py" ]; then
          python -m locust -f tests/performance_test.py --headless \
            --users 10 --spawn-rate 2 --run-time 60s --host $API_TEST_BASE_URL
        fi
    
    - name: Upload Performance Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: performance-test-report
        path: locust_report.html
